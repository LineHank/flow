<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="format-detection" content="telephone=no">
  <!--避免微信管理防盗链机制-->
  <meta name="referrer" content="no-referrer"/>
  <meta http-equiv="X-UA-Compatible" content="chrome=1"/>
  <link rel="stylesheet" href="<%= BASE_URL %>cdn/style/index.css">
  <link rel="icon" href="<%= BASE_URL %>favicon.ico">
  <title>Howe工作流引擎</title>
</head>

<body style="margin: 0; overflow: hidden;">
<noscript>
  <strong>We're sorry but Howe doesn't work properly without JavaScript enabled. Please enable it to
    continue.</strong>
</noscript>
<div id="app">
  <div class="howe-home">
    <div class="howe-home__main">
      <div class="howe-home__loader">
        <img class="howe-home__spinner" src="./svg/loading-spin.svg" alt="loading">
      </div>
      <h2 class="howe-home__title">流程设计器</h2>
      <p class="howe-home__subtitle">
        正在加载，请稍候<span class="howe-home__dots"><i></i><i></i><i></i></span>
      </p>
    </div>
    <footer class="howe-home__footer">
      <span>Copyright © 2026 Howe</span>
    </footer>
  </div>
</div>
</body>
</html>
